name: wikimedia-realtime-pipeline

# Shared network all services talk over
networks:
  stream_net:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── 1. Kafka (KRaft mode — no Zookeeper, single node) ──────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    networks:
      - stream_net
    ports:
      - "29092:29092"          # access from the host (for debugging)
    environment:
      # KRaft: broker + controller on the same node
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Two listeners: INTERNAL (between containers) + HOST (your machine)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT

      # All replication factors are 1 because this is a single node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── 2. Producer (Wikimedia SSE → Kafka) ───────────────────────────────────
  producer:
    build: ./producer
    container_name: wiki_producer
    networks:
      - stream_net
    depends_on:
      kafka:
        condition: service_healthy   # don't start before Kafka is ready
    environment:
      KAFKA_BOOTSTRAP: kafka:9092    # INTERNAL listener from inside the container
      KAFKA_TOPIC: wiki.changes
    restart: unless-stopped          # restart the container if the stream drops

  # ── 3. PostgreSQL (where the real-time summaries are written) ──────────────
  postgres:
    image: postgres:15
    container_name: stream_postgres
    networks:
      - stream_net
    environment:
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
      POSTGRES_DB: wikistream
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "stream"]
      interval: 10s
      retries: 5

  # ── 4. Consumer (Kafka → PostgreSQL summaries) ─────────────────────────────
  consumer:
    build: ./consumer
    container_name: wiki_consumer
    networks:
      - stream_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: wiki.changes
      KAFKA_GROUP_ID: wiki-consumer
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: wikistream
      DB_USER: stream
      DB_PASSWORD: stream
    restart: unless-stopped
